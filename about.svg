<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
<style>
  .title  { font-family: Segoe UI, Roboto, Ubuntu, sans-serif; font-size: 40px; font-weight: 700; fill: #e6edf3; }
  .role   { font-family: Segoe UI, Roboto, Ubuntu, sans-serif; font-size: 17px; fill: #9da7b3; letter-spacing: 0.5px; }
  .label  { font-family: 'Courier New', monospace; font-size: 10px; fill: #58a6ff; letter-spacing: 3px; }
  .body   { font-family: Segoe UI, Roboto, Ubuntu, sans-serif; font-size: 13.5px; fill: #c9d1d9; }
  .dim    { font-family: Segoe UI, Roboto, Ubuntu, sans-serif; font-size: 13.5px; fill: #8b949e; }
  .stack  { font-family: 'Courier New', monospace; font-size: 12px; fill: #8b949e; letter-spacing: 1px; }
  .stat-n { font-family: Segoe UI, Roboto, Ubuntu, sans-serif; font-size: 26px; font-weight: 700; }
  .stat-l { font-family: 'Courier New', monospace; font-size: 9px; fill: #8b949e; letter-spacing: 2px; }
  .glow   { filter: drop-shadow(0 0 10px #58a6ff88); }
</style>
<defs>
  <!-- Animated border gradient -->
  <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#58a6ff"><animate attributeName="stop-color" values="#58a6ff;#a371f7;#58a6ff" dur="4s" repeatCount="indefinite"/></stop>
    <stop offset="50%"  stop-color="#a371f7"><animate attributeName="stop-color" values="#a371f7;#58a6ff;#a371f7" dur="4s" repeatCount="indefinite"/></stop>
    <stop offset="100%" stop-color="#58a6ff"><animate attributeName="stop-color" values="#58a6ff;#a371f7;#58a6ff" dur="4s" repeatCount="indefinite"/></stop>
  </linearGradient>
  <!-- Line gradient -->
  <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#58a6ff"/>
    <stop offset="50%"  stop-color="#a371f7"/>
    <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
  </linearGradient>
  <!-- Stat line -->
  <linearGradient id="statLine" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#58a6ff" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="900" height="340" rx="18" fill="#0d1117"/>

<!-- Subtle inner glow top-left -->
<ellipse cx="120" cy="80" rx="180" ry="100" fill="#58a6ff" opacity="0.03"/>
<!-- Subtle inner glow bottom-right -->
<ellipse cx="800" cy="280" rx="160" ry="100" fill="#a371f7" opacity="0.04"/>

<!-- Border animated -->
<rect x="1.5" y="1.5" width="897" height="337" rx="18" stroke="url(#border)" stroke-width="1.5" fill="transparent">
  <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
</rect>

<!-- ── NAME + ROLE ── -->
<text x="60" y="76" class="title glow">Luiz Felipe</text>
<text x="62" y="100" class="role">Senior Software Engineer  ·  Full Stack Developer  ·  Brazil 🇧🇷</text>

<!-- Divider -->
<rect x="60" y="116" width="780" height="1.5" fill="url(#line)"/>

<!-- ── ABOUT BLOCK ── -->
<text x="60" y="140" class="label">ABOUT</text>
<text x="60" y="160" class="body">Senior Software Engineer with 5+ years of experience designing and shipping</text>
<text x="60" y="178" class="body">scalable, maintainable systems across the full stack. Deeply committed to</text>
<text x="60" y="196" class="dim">clean architecture, great developer experience and building software that</text>
<text x="60" y="214" class="dim">genuinely solves real-world problems with precision and craftsmanship.</text>

<!-- Divider 2 -->
<rect x="60" y="228" width="780" height="1" fill="url(#line)" opacity="0.4"/>

<!-- ── STACK LINE ── -->
<text x="60" y="250" class="label">STACK</text>
<text x="60" y="269" class="stack">TypeScript  ·  JavaScript  ·  Python  ·  Java  ·  Go  ·  React  ·  Node.js  ·  NestJS  ·  Docker  ·  AWS  ·  PostgreSQL  ·  Redis</text>

<!-- Divider 3 -->
<rect x="60" y="283" width="780" height="1" fill="url(#line)" opacity="0.4"/>

<!-- ── PRACTICES LINE ── -->
<text x="60" y="303" class="label">PRACTICES</text>
<text x="60" y="322" class="stack">Clean Architecture  ·  SOLID  ·  TDD  ·  DDD  ·  Microservices  ·  CI/CD  ·  Code Review  ·  Agile</text>

<!-- ── STAT NUMBERS top-right ── -->
<!-- Divider vert -->
<rect x="684" y="130" width="1" height="145" fill="url(#statLine)"/>
<rect x="762" y="130" width="1" height="145" fill="url(#statLine)"/>

<text x="722" y="178" text-anchor="middle" class="stat-n" fill="#58a6ff" style="filter:drop-shadow(0 0 8px #58a6ff66)">5+</text>
<text x="722" y="196" text-anchor="middle" class="stat-l">YRS EXP</text>

<text x="800" y="178" text-anchor="middle" class="stat-n" fill="#a371f7" style="filter:drop-shadow(0 0 8px #a371f766)">30+</text>
<text x="800" y="196" text-anchor="middle" class="stat-l">PROJECTS</text>

<text x="722" y="238" text-anchor="middle" class="stat-n" fill="#58a6ff" style="filter:drop-shadow(0 0 8px #58a6ff66)">10+</text>
<text x="722" y="256" text-anchor="middle" class="stat-l">LANGUAGES</text>

<text x="800" y="238" text-anchor="middle" class="stat-n" fill="#a371f7" style="filter:drop-shadow(0 0 8px #a371f766)">∞</text>
<text x="800" y="256" text-anchor="middle" class="stat-l">PASSION</text>

<!-- ── DECORATIVE DOTS ── -->
<circle cx="835" cy="48" r="6" fill="#58a6ff">
  <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="858" cy="72" r="4" fill="#a371f7">
  <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="824" cy="92" r="3" fill="#58a6ff">
  <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="848" cy="108" r="2.5" fill="#a371f7">
  <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
</circle>

<!-- STATUS pill -->
<rect x="60" y="304" width="0" height="0" rx="0"/>
<!-- open-to chip bottom left aligned with last line -->
<rect x="592" y="311" width="136" height="20" rx="10" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
<circle cx="607" cy="321" r="4" fill="#58a6ff">
  <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
</circle>
<text x="672" y="325" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#58a6ff" letter-spacing="1">OPEN TO WORK</text>

</svg>
